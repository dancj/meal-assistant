name: Weekly Meal Plan

on:
  schedule:
    # Every Sunday at 8:00 AM UTC
    - cron: "0 8 * * 0"
  workflow_dispatch:

jobs:
  generate-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Generate and email meal plan
        run: |
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -X POST "${{ secrets.API_URL }}/api/generate-plan" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"preferences\": \"${{ secrets.DIETARY_PREFERENCES }}\"}")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" -ne 200 ]; then
            echo "::error::Meal plan generation failed with status $HTTP_CODE: $BODY"
            exit 1
          fi

          # Check if email was sent successfully
          EMAIL_SENT=$(echo "$BODY" | jq -r '.emailSent // false')
          if [ "$EMAIL_SENT" != "true" ]; then
            EMAIL_ERROR=$(echo "$BODY" | jq -r '.emailError // "unknown error"')
            echo "::warning::Meal plan generated but email failed: $EMAIL_ERROR"
            exit 1
          fi

          echo "Meal plan generated and emailed successfully."
